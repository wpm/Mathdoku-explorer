name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTDOCFLAGS: "-D warnings"

jobs:
  # ── Checks (mirrors .githooks/pre-commit) ──────────────────────────────────
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      # ── fmt ──────────────────────────────────────────────────────────────
      - name: cargo fmt (mathdoku)
        run: cargo fmt --all -- --check

      - name: cargo fmt (mathdoku-designer)
        run: cd apps/designer && cargo fmt --all -- --check

      # ── clippy ───────────────────────────────────────────────────────────
      # Lint levels live in the root `[workspace.lints]`; every crate opts in
      # via `[lints] workspace = true`. `-D warnings` escalates the warn-level
      # `unused_results` to an error so regressions fail CI. The Tauri crate is
      # excluded because its GTK/WebKit system libraries are not installed on
      # this runner.
      - name: cargo clippy (workspace)
        run: cargo clippy --workspace --exclude mathdoku-designer-tauri --all-targets -- -D warnings

      # ── doc ──────────────────────────────────────────────────────────────
      - name: cargo doc
        run: cargo doc --no-deps -p mathdoku

  # ── Tests (runs on every push, independently of the checks above) ──────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo test (mathdoku)
        run: cargo test --lib -p mathdoku

      - name: cargo test (mathdoku-designer)
        run: cd apps/designer && cargo test

  # ── Code coverage ──────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: cargo llvm-cov (mathdoku)
        run: cargo llvm-cov --lib -p mathdoku --lcov --output-path lcov-mathdoku.info

      - name: cargo llvm-cov (mathdoku-designer)
        run: cd apps/designer && cargo llvm-cov --lcov --output-path ../../lcov-designer.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov-mathdoku.info,lcov-designer.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── End-to-end tests (Playwright against the WASM/web layer) ────────────────
  e2e:
    name: E2E
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/designer/e2e

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      # Prebuilt trunk binary (matches the cargo-llvm-cov pattern in `coverage`).
      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/designer/e2e/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # playwright.config.ts auto-starts `trunk serve` (180s timeout for the
      # cold wasm build) and tears it down when the run finishes.
      - name: Run Playwright tests
        run: npx playwright test

      # Same suite against the WASM-everything build (`trunk serve --features
      # web`, served on :1421 by playwright.web.config.ts) — exercises the
      # puzzle-state commands in-process against mathdoku-designer-core, with
      # no Tauri stubs.
      - name: Run Playwright tests (web build)
        run: npm run test:web

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/designer/e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore

  # ── Web preview build (ADR-0002 `--features web`) ──────────────────────────
  # Builds the standalone in-browser preview bundle. The deploy workflows and
  # the bundle-size gate reuse this exact `trunk build` command.
  web-build:
    name: Web build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/designer

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      # Prebuilt trunk binary (matches the e2e and coverage jobs).
      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: trunk build --release --features web
        run: trunk build --release --features web

  # ── Bundle size (ADR-0002 ≤ 2 MB brotli budget) ────────────────────────────
  # Enforced here rather than in the deploy workflows: bundle bloat should
  # block merges, not block deploys. If this gate trips, the answer is to
  # optimize (wasm-opt -Oz, lazy-loading), not to raise the number.
  bundle-size:
    name: Bundle size
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/designer

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      # Prebuilt trunk binary (matches the e2e and web-build jobs).
      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: trunk build --release --features web
        run: trunk build --release --features web

      - name: Enforce 2 MB brotli budget on the WASM bundle
        run: |
          command -v brotli > /dev/null || { sudo apt-get update && sudo apt-get install -y brotli; }
          budget=$((2 * 1024 * 1024))
          status=0
          for wasm in dist/*_bg.wasm; do
            brotli -q 11 --keep "$wasm"
            size=$(stat -c %s "${wasm}.br")
            echo "$(basename "$wasm"): ${size} bytes brotli-compressed (budget: ${budget} bytes)"
            if [ "$size" -gt "$budget" ]; then
              echo "::error file=${wasm}::compressed WASM bundle is ${size} bytes, over the ${budget}-byte (2 MB brotli) budget set by ADR-0002"
              status=1
            fi
          done
          exit "$status"

  # ── Feature isolation ──────────────────────────────────────────────────────
  # ADR-0002 requires the `web` feature stay namespaced to the frontend crate
  # and inert in native builds. Fail if `web` is pulled into the default build
  # graph.
  feature-isolation:
    name: Feature isolation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/designer

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Assert `web` is absent from the default build graph
        run: |
          if cargo tree -e features -p mathdoku-designer-ui | grep -q 'mathdoku-designer-ui feature "web"'; then
            echo "::error::the 'web' feature is enabled in the default build graph"
            exit 1
          fi
          echo "ok: the 'web' feature is namespaced and inert in native builds"

  # ── Slow tests (main only) ────────────────────────────────────────────────
  slow-tests:
    name: Slow tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo test --include-ignored (mathdoku)
        run: cargo test --lib -p mathdoku -- --include-ignored

  # ── Cross-platform release builds (main only) ──────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    if: github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compiler (aarch64-unknown-linux-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release -p mathdoku --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
