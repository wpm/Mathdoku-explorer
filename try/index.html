<!doctype html>
<!--
  The /try iframe shell from ADR-0002. The shell owns the page chrome; the
  iframe owns the canvas, pointed at the canonical web build deployed by
  .github/workflows/deploy-main.yml. The markup stays this small on purpose,
  which is why there is no CSS framework here.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Try Mathdoku Designer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap"
    />
    <link rel="stylesheet" href="../theme.css" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        flex-direction: column;
        font-family: var(--font-sans);
        background-color: var(--paper-bg);
        color: var(--paper-ink);
      }
      header {
        padding: 0.5rem 1rem;
        border-bottom: 1px solid var(--paper-line);
      }
      header h1 {
        display: inline;
        font-family: var(--font-serif);
        font-size: 1.2rem;
        font-weight: 700;
        margin: 0 1rem 0 0;
      }
      header h1 a {
        color: var(--paper-ink);
        text-decoration: none;
      }
      header h1 a:hover {
        color: var(--paper-accent);
      }
      .banner {
        display: inline;
        font-style: italic;
        color: var(--paper-ink-2);
      }
      iframe {
        flex: 1;
        border: 0;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <header>
      <h1><a href="../">Mathdoku</a></h1>
      <p class="banner">
        Ephemeral demo — install the app to save what you make.
      </p>
    </header>
    <!--
      allow-scripts: the WASM bundle is JavaScript-bootstrapped.
      allow-same-origin: GitHub Pages sends no CORS headers, so an
      opaque-origin sandbox could not fetch the bundle's own .wasm asset.
    -->
    <iframe
      src="https://wpm.github.io/Mathdoku/main/"
      title="Mathdoku Designer web demo"
      sandbox="allow-scripts allow-same-origin"
    ></iframe>
  </body>
</html>
